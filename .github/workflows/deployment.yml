name: Deployment
run-name: ${{ inputs.tag_name }} / ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
      environment:
        description: "Deployment environment"
        default: production
        type: choice
        options:
          - production
          - staging
      platforms:
        description: "Target platforms"
        default: "linux,windows,macos"
        type: string
      release:
        description: "Create GitHub Release"
        type: boolean
        default: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag format (use v1.2.3)"
            exit 1
          fi

  build:
    needs: validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [linux, windows, macos]

    steps:
      - name: Skip unwanted platforms
        run: |
          if [[ "${{ inputs.platforms }}" != *"${{ matrix.os }}"* ]]; then
            echo "Skipping ${{ matrix.os }}"
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Set version tag
        run: git tag ${{ inputs.tag_name }}

      - name: Build binaries
        run: |
          mkdir -p dist

          if [ "${{ matrix.os }}" = "linux" ]; then
            GOOS=linux GOARCH=amd64 go build -o dist/cli-linux
          fi

          if [ "${{ matrix.os }}" = "windows" ]; then
            GOOS=windows GOARCH=amd64 go build -o dist/cli-windows.exe
          fi

          if [ "${{ matrix.os }}" = "macos" ]; then
            GOOS=darwin GOARCH=amd64 go build -o dist/cli-macos
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.release

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mkdir dist
          cp -r linux/* dist/ || true
          cp -r windows/* dist/ || true
          cp -r macos/* dist/ || true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: "Release ${{ inputs.tag_name }}"
          files: dist/*
